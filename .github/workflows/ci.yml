name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install WPF workload
        run: dotnet workload install wpf

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache HarmonyOS Sans font
        uses: actions/cache@v4
        with:
          path: EiTRVO.UI/font/Font.ttf
          key: harmonyos-font-v2

      - name: Acquire HarmonyOS Sans SC font
        shell: pwsh
        run: |
          $fontDir  = "EiTRVO.UI/font"
          $fontFile = "$fontDir/Font.ttf"
          $fontUrl  = "https://developer.huawei.com/images/download/next/HarmonyOS-Sans-v2.zip"
          $zipFile  = "$env:TEMP/HarmonyOS-Sans.zip"

          if (Test-Path $fontFile) {
              Write-Host "Font.ttf already present, skipping download."
              exit 0
          }

          Write-Host "Downloading HarmonyOS Sans from Huawei CDN..."
          Invoke-WebRequest -Uri $fontUrl -OutFile $zipFile

          Expand-Archive -Path $zipFile -DestinationPath "$env:TEMP/HarmonyOS-Sans" -Force
          $scRegular = "$env:TEMP/HarmonyOS-Sans/HarmonyOS_SansSC/HarmonyOS_SansSC_Regular.ttf"
          if (-not (Test-Path $scRegular)) {
              throw "Cannot find HarmonyOS_SansSC_Regular.ttf in the zip (expected: $scRegular)"
          }

          New-Item -Path $fontDir -ItemType Directory -Force | Out-Null
          Copy-Item -Path $scRegular -Destination $fontFile
          Write-Host "Font acquired: HarmonyOS_SansSC_Regular.ttf -> $fontFile"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build all projects
        run: dotnet build --no-restore -c Release

      - name: Run all tests
        run: dotnet test --no-restore -c Release --logger "trx;LogFileName=test-results.trx" --results-directory "${{ github.workspace }}/TestResults"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: MSTest Results
          path: "${{ github.workspace }}/TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload test result artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: "${{ github.workspace }}/TestResults/"
          retention-days: 14

      - name: Check code formatting
        continue-on-error: true
        run: dotnet format --verify-no-changes --verbosity minimal
