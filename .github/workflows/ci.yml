name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache HarmonyOS Sans font
        uses: actions/cache@v4
        with:
          path: EiTRVO.UI/font/Font.ttf
          key: harmonyos-font-v2

      - name: Acquire HarmonyOS Sans SC font
        shell: pwsh
        run: |
          $fontDir  = "EiTRVO.UI/font"
          $fontFile = "$fontDir/Font.ttf"
          $fontUrl  = "https://developer.huawei.com/images/download/next/HarmonyOS-Sans-v2.zip"
          $zipFile  = "$env:TEMP/HarmonyOS-Sans.zip"

          if (Test-Path $fontFile) {
              Write-Host "Font.ttf already present, skipping download."
              exit 0
          }

          Write-Host "Downloading HarmonyOS Sans from Huawei CDN..."
          $retries = 3
          for ($i = 1; $i -le $retries; $i++) {
              try {
                  Invoke-WebRequest -Uri $fontUrl -OutFile $zipFile -ErrorAction Stop
                  break
              } catch {
                  if ($i -eq $retries) { throw }
                  Write-Host "Download attempt $i failed, retrying in 5s..."
                  Start-Sleep -Seconds 5
              }
          }

          Expand-Archive -Path $zipFile -DestinationPath "$env:TEMP/HarmonyOS-Sans" -Force
          $scRegular = Get-ChildItem "$env:TEMP/HarmonyOS-Sans" -Recurse -Filter "HarmonyOS_SansSC_Regular.ttf" | Select-Object -First 1
          if (-not $scRegular) {
              # Fallback: look for any SC Regular variant
              $scRegular = Get-ChildItem "$env:TEMP/HarmonyOS-Sans" -Recurse -Filter "*SC*Regular*.ttf" | Select-Object -First 1
          }
          if (-not $scRegular) {
              # List zip contents for debugging
              Get-ChildItem "$env:TEMP/HarmonyOS-Sans" -Recurse -Filter "*.ttf" | ForEach-Object { Write-Host "Found: $($_.FullName)" }
              throw "Cannot find HarmonyOS_SansSC_Regular.ttf in the zip"
          }

          New-Item -Path $fontDir -ItemType Directory -Force | Out-Null
          Copy-Item -Path $scRegular -Destination $fontFile
          Write-Host "Font acquired: HarmonyOS_SansSC_Regular.ttf -> $fontFile"

      - name: Restore dependencies
        run: |
          dotnet restore "EiTRVO.UI/EiTRVO.UI.csproj"
          dotnet restore "EiTRVO.Tests/EiTRVO.Tests.csproj"

      - name: Build all projects
        run: |
          dotnet build "EiTRVO.UI/EiTRVO.UI.csproj" --no-restore -c Release
          dotnet build "EiTRVO.Tests/EiTRVO.Tests.csproj" --no-restore -c Release

      - name: Run all tests
        run: dotnet test "EiTRVO.Tests/EiTRVO.Tests.csproj" --no-restore --no-build -c Release --logger "trx;LogFileName=test-results.trx" --results-directory "TestResults"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: MSTest Results
          path: "TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload test result artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: "TestResults/"
          retention-days: 14

      - name: Check NuGet packages for vulnerabilities
        run: |
          dotnet list "EiTRVO.UI/EiTRVO.UI.csproj" package --vulnerable
          dotnet list "EiTRVO.Tests/EiTRVO.Tests.csproj" package --vulnerable

      - name: Check code formatting
        run: dotnet format "EiTRVO.UI/EiTRVO.UI.csproj" "EiTRVO.ProEngine/EiTRVO.ProEngine.csproj" "EiTRVO.Tests/EiTRVO.Tests.csproj" --verify-no-changes --verbosity minimal
